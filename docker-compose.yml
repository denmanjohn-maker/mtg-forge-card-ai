version: "3.9"

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mtg_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: mtgforge
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Qdrant Vector Store ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mtg_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── .NET 8 Backend ──────────────────────────────────────────────────────────
  mtgforge:
    build:
      context: ./MtgForgeLocal
      dockerfile: Dockerfile
    container_name: mtg_forge_api
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDB__ConnectionString=mongodb://admin:password@mongodb:27017
      - MongoDB__DatabaseName=mtgforge
      - Qdrant__Host=qdrant
      - Qdrant__Port=6334
      # Ollama runs natively on the Mac host, not in Docker
      # (Apple Silicon Metal acceleration doesn't work inside Docker)
      - Ollama__BaseUrl=http://host.docker.internal:11434
      - Ollama__Model=llama3.1:8b
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mongodb_data:
  qdrant_data:
