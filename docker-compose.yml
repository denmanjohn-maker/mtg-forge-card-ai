version: "3.9"

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mtg_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: mtgforge
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Qdrant Vector Store ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mtg_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── .NET 10 Backend ─────────────────────────────────────────────────────────
  mtgforge:
    build:
      context: ./MtgForgeAi
      dockerfile: Dockerfile
    container_name: mtg_forge_api
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDB__ConnectionString=mongodb://admin:password@mongodb:27017
      - MongoDB__DatabaseName=mtgforge
      - Qdrant__Host=qdrant
      - Qdrant__Port=6334
      # Ollama runs natively on the Mac host, not in Docker
      # (Apple Silicon Metal acceleration doesn't work inside Docker)
      - Ollama__BaseUrl=http://host.docker.internal:11434
      - Ollama__Model=llama3.1:8b
      # OpenTelemetry — traces sent to Tempo via OTLP gRPC
      - OTEL__Endpoint=http://tempo:4317
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
      tempo:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: mtg_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - mtgforge

  # ─── Grafana Tempo (distributed tracing) ─────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: mtg_tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo API / query
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]

  # ─── Grafana (dashboards for Prometheus + Tempo + Loki) ──────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: mtg_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceToMetrics
      # Set GF_LOKI_URL to your Loki endpoint if using Grafana Cloud or a remote Loki
      - GF_LOKI_URL=${GF_LOKI_URL:-http://localhost:3100}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

volumes:
  mongodb_data:
  qdrant_data:
  prometheus_data:
  tempo_data:
  grafana_data:
